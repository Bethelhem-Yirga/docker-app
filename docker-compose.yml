version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flask-backend
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development      # ⭐ Enables debug mode
      - FLASK_DEBUG=1              # ⭐ Enables auto-reload
      - PYTHONUNBUFFERED=1
    # ⭐ HOT RELOAD SETUP:
    volumes:
      - ./backend:/app             # Mount local code into container
    command: flask run --host=0.0.0.0 --port=5000 --debug  # ⭐ Auto-reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-frontend
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "3000:3000"                # ⭐ Use port 3000 for React dev server
    environment:
      - REACT_APP_API_URL=http://backend:5000
    # ⭐ HOT RELOAD SETUP:
    volumes:
      - ./frontend:/app            # Mount local code
      - /app/node_modules          # Keep node_modules inside container
    command: npm start             # ⭐ React's development server with hot reload

networks:
  app-network:
    driver: bridge
    name: app-network